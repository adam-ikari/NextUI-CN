name: PCSX Mod Build Test

on:
  push:
    branches:
      - feature/pcsx-precision-clean-v2
  workflow_dispatch:

jobs:
  build-pcsx-mod:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout NextUI-CN
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Clone pcsx_rearmed_mod
        run: |
          cd /tmp
          git clone --depth 1 https://github.com/adam-ikari/pcsx_rearmed_mod.git pcsx_mod_test || echo "Repository may be empty or not exist"
          ls -la pcsx_mod_test 2>/dev/null || echo "Directory does not exist"

      - name: Check pcsx_rearmed_mod content
        run: |
          if [ -d /tmp/pcsx_mod_test ]; then
            echo "=== pcsx_rearmed_mod repository contents ==="
            ls -la /tmp/pcsx_mod_test/
            
            if [ -f /tmp/pcsx_mod_test/Makefile.libretro ]; then
              echo "=== Makefile.libretro exists ==="
              head -20 /tmp/pcsx_mod_test/Makefile.libretro
            else
              echo "=== Makefile.libretro not found ==="
            fi
            
            if [ -d /tmp/pcsx_mod_test/plugins/gpulib ]; then
              echo "=== GPU plugin files ==="
              ls -la /tmp/pcsx_mod_test/plugins/gpulib/
              
              echo "=== Check for precision enhancements ==="
              grep -n "SUBPIXEL_SHIFT" /tmp/pcsx_mod_test/plugins/gpulib/prim.c 2>/dev/null || echo "No precision code found in prim.c"
              grep -n "SUBPIXEL_SHIFT" /tmp/pcsx_mod_test/plugins/gpulib/gpu.c 2>/dev/null || echo "No precision code found in gpu.c"
            fi
          else
            echo "pcsx_rearmed_mod repository is empty or does not exist"
            echo "Attempting to initialize it..."
            
            # Clone from original pcsx_rearmed
            cd /tmp
            git clone --depth 1 --branch r25l https://github.com/libretro/pcsx_rearmed pcsx_mod_init
            cd pcsx_mod_init
            
            # Add precision enhancements
            cat >> plugins/gpulib/prim.c << 'EOF'

/* PS Subpixel Vertex Precision Enhancement */
#ifndef PCSX_PRECISION_DISABLE
#define SUBPIXEL_SHIFT 4
#define SUBPIXEL_ONE (1 << SUBPIXEL_SHIFT)
#define TO_SUBPIXEL(x) ((x) << SUBPIXEL_SHIFT)
#define FROM_SUBPIXEL(x) ((x) >> SUBPIXEL_SHIFT)
#endif
EOF
            
            cat >> plugins/gpulib/gpu.c << 'EOF'

/* PS Subpixel Vertex Precision Enhancement */
#ifndef PCSX_PRECISION_DISABLE
#define SUBPIXEL_SHIFT 4
#define SUBPIXEL_ONE (1 << SUBPIXEL_SHIFT)
#define TO_SUBPIXEL(x) ((x) << SUBPIXEL_SHIFT)
#define FROM_SUBPIXEL(x) ((x) >> SUBPIXEL_SHIFT)
#endif
EOF
            
            # Commit changes
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add -A
            git commit -m "feat: add PS subpixel vertex precision enhancement"
            
            echo "Repository initialized with precision enhancements"
            echo "=== Modified files ==="
            git diff --stat
          fi

      - name: Test build pcsx_rearmed_mod
        if: success()
        run: |
          if [ -d /tmp/pcsx_mod_test ] && [ -f /tmp/pcsx_mod_test/Makefile.libretro ]; then
            cd /tmp/pcsx_mod_test
            echo "=== Building pcsx_rearmed_mod ==="
            make -f Makefile.libretro platform=tg5040 clean || true
            make -f Makefile.libretro platform=tg5040 -j4 || echo "Build failed"
            
            if [ -f pcsx_rearmed_libretro.so ]; then
              echo "=== Build successful! ==="
              ls -lh pcsx_rearmed_libretro.so
              file pcsx_rearmed_libretro.so
            else
              echo "=== Build failed, no output file found ==="
            fi
          elif [ -d /tmp/pcsx_mod_init ]; then
            cd /tmp/pcsx_mod_init
            echo "=== Building initialized pcsx_rearmed_mod ==="
            make -f Makefile.libretro platform=tg5040 clean || true
            make -f Makefile.libretro platform=tg5040 -j4 || echo "Build failed"
            
            if [ -f pcsx_rearmed_libretro.so ]; then
              echo "=== Build successful! ==="
              ls -lh pcsx_rearmed_libretro.so
              file pcsx_rearmed_libretro.so
            else
              echo "=== Build failed, no output file found ==="
            fi
          else
            echo "No pcsx_rearmed_mod source available to build"
          fi

      - name: Build Summary
        if: always()
        run: |
          echo "=== Build Test Summary ==="
          echo "pcsx_rearmed_mod repository status:"
          if [ -d /tmp/pcsx_mod_test ]; then
            echo "- Repository exists and has content"
            ls -la /tmp/pcsx_mod_test/ | head -10
          elif [ -d /tmp/pcsx_mod_init ]; then
            echo "- Repository was initialized from pcsx_rearmed"
            ls -la /tmp/pcsx_mod_init/ | head -10
          else
            echo "- Repository is empty or not accessible"
          fi
          
          echo "Build artifacts:"
          find /tmp -name "pcsx_rearmed_libretro.so" 2>/dev/null || echo "No build artifacts found"